<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codnia IDE</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0c0c0c;
        --bg-secondary: #111111;
        --bg-tertiary: #1a1a1a;
        --bg-hover: #222222;
        --bg-active: #2a2a2a;
        --border: #2a2a2a;
        --border-light: #333333;
        --text-primary: #ffffff;
        --text-secondary: #888888;
        --text-tertiary: #555555;
        --accent: #5a5a5a;
        --accent-blue: #0070f3;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-yellow: #f59e0b;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .activity-bar {
        display: flex;
        flex-direction: column;
        width: 48px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        padding: 8px 0;
        gap: 4px;
        flex-shrink: 0;
      }

      .activity-btn {
        width: 32px;
        height: 32px;
        margin: 0 auto;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }

      .activity-btn:hover {
        background: var(--bg-hover);
      }

      .activity-btn.active {
        background: var(--bg-active);
      }

      .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .sidebar {
        width: 250px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: none;
        flex-direction: column;
      }

      .sidebar.visible {
        display: flex;
      }

      .sidebar-header {
        padding: 12px 16px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-secondary);
        letter-spacing: 0.5px;
      }

      .explorer-tree {
        flex: 1;
        overflow-y: auto;
        padding: 0 8px;
      }

      .tree-item {
        display: flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        gap: 6px;
      }

      .tree-item:hover {
        background: var(--bg-hover);
      }

      .tree-item.folder {
        font-weight: 500;
      }

      .editor-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .tabs-bar {
        display: flex;
        height: 36px;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }

      .tab {
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 13px;
        color: var(--text-secondary);
        border-right: 1px solid var(--border);
        cursor: pointer;
        gap: 8px;
        white-space: nowrap;
      }

      .tab:hover {
        background: var(--bg-hover);
      }

      .tab.active {
        color: var(--text-primary);
        background: var(--bg-tertiary);
        border-bottom: 2px solid var(--accent-blue);
      }

      .tab .close {
        opacity: 0;
        font-size: 16px;
        cursor: pointer;
      }

      .tab:hover .close {
        opacity: 1;
      }

      .editor-container {
        flex: 1;
        overflow: hidden;
      }

      #monaco-editor {
        width: 100%;
        height: 100%;
      }

      .status-bar {
        display: flex;
        height: 24px;
        background: var(--accent-blue);
        padding: 0 12px;
        align-items: center;
        font-size: 12px;
        gap: 16px;
        flex-shrink: 0;
      }

      .status-item {
        color: var(--text-primary);
      }

      .status-item.clickable:hover {
        background: rgba(255,255,255,0.1);
        cursor: pointer;
      }

      .status-spacer {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="main-content">
        <div class="activity-bar">
          <button class="activity-btn active" data-view="explorer" title="Explorer">📁</button>
          <button class="activity-btn" data-view="search" title="Search">🔍</button>
          <button class="activity-btn" data-view="git" title="Git">⎇</button>
          <button class="activity-btn" data-view="extensions" title="Extensions">🧩</button>
          <button class="activity-btn" data-view="settings" title="Settings">⚙</button>
        </div>

        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">Explorer</div>
          <div class="explorer-tree" id="explorer-tree">
            <div class="tree-item folder">📁 codnia</div>
            <div class="tree-item">📄 Cargo.toml</div>
            <div class="tree-item">📄 build.rs</div>
            <div class="tree-item">📁 src-tauri</div>
            <div class="tree-item">📁 frontend</div>
          </div>
        </div>

        <div class="editor-area">
          <div class="tabs-bar">
            <div class="tab active">main.rs ×</div>
            <div class="tab">lib.rs</div>
          </div>
          <div class="editor-container">
            <div id="monaco-editor"></div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span class="status-item">main ✓</span>
        <span class="status-item">0 problems</span>
        <span class="status-spacer"></span>
        <span class="status-item">Spaces: 4</span>
        <span class="status-item">UTF-8</span>
        <span class="status-item">Rust</span>
        <span class="status-item">Ln 1, Col 1</span>
      </div>
    </div>

    <script type="module" src="/src/editor.ts"></script>
    <script>
      document.querySelectorAll('.activity-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const view = btn.dataset.view;
          const sidebar = document.getElementById('sidebar');
          
          if (view === 'explorer') {
            sidebar.classList.add('visible');
          } else {
            sidebar.classList.remove('visible');
          }
        });
      });
    </script>
  </body>
</html>
